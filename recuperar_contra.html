<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - TideSurf</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/recuperar_contra.css">
</head>
<body>
 
    <div class="interfaz-navegador">
        
        <h1 class="titulo-registro-principal">Recuperar Contraseña</h1>
 
        <div class="tarjeta-registro-contenedor">
            
            <div class="panel-izquierdo-visual">
                <div class="capa-degradado-oceano"></div>
                <div class="branding-inferior">
                    <div class="logo-tidesurf">
                        <i class='bx bx-water'></i> <span>TideSurf</span>
                    </div>
                </div>
            </div>
 
            <div class="panel-derecho-formulario">
                <h2 class="titulo-formulario">¿Olvidaste tu contraseña?</h2>
                <p class="subtitulo-formulario">Ingresa tu correo electrónico para restablecerla</p>
 
                <form class="formulario-registro" action="#" method="POST">
                    
                    <div class="contenedor-input-icono">
                        <i class='bx bx-envelope input-icon'></i>
                        <input type="email" name="email" placeholder="Tu correo electrónico" required>
                    </div>
 
                    <div class="enlace-login-redireccion">
                        ¿Ya tienes cuenta? <a href="inicio_sesion.html">Iniciar sesión</a>
                    </div>
 
                    <button type="submit" class="boton-registrarse-tide">
                        <i class='bx bx-send'></i> Enviar enlace
                    </button>
                </form>
                
                <div class="back">
                    <a href="inicio_sesion.html">
                        <i class='bx bx-arrow-back'></i> Volver al login
                    </a>
                </div>
            </div>
 
        </div>
 
    </div>
 <script src="js/registro.js"></script>
</body>
</html>
